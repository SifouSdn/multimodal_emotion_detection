name: Build Manuscript PDF

on:
  workflow_dispatch:
  push:
    paths:
      - "seif_paper_revised.tex"
      - "**/*.bib"
      - "figures/**"
      - ".github/workflows/build-manuscript.yml"

permissions:
  contents: read

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile manuscript
        uses: xu-cheng/latex-action@v3
        with:
          root_file: seif_paper_revised.tex
          args: -pdf -interaction=nonstopmode -halt-on-error

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: seif_paper_revised-pdf
          path: seif_paper_revised.pdf
          if-no-files-found: error
